<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALWAA · Система цеха</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap&subset=cyrillic,cyrillic-ext,latin" rel="stylesheet">
<style>
:root{
  --cream:#f6f1e7; --cream2:#efe7d6; --ink:#22301f; --ink2:#3c4d36;
  --green:#1f3d2b; --green2:#2e5a3e; --gold:#b58a2e; --gold2:#d8b25a;
  --line:#ddd2bb; --card:#fffdf8; --bad:#9c2b2b; --badbg:#f7dcd6; --ok:#2e6b3e;
  --shadow:0 6px 22px rgba(40,55,35,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:
  radial-gradient(1200px 600px at 90% -10%, #efe9d8 0%, transparent 60%),
  var(--cream);color:var(--ink);min-height:100vh}
.app{display:flex;min-height:100vh}
/* sidebar */
.side{width:248px;flex:0 0 248px;background:linear-gradient(180deg,var(--green) 0%,#16291d 100%);
  color:#f3ecdd;padding:22px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold2),var(--gold));
  display:grid;place-items:center;font-family:'Playfair Display',serif;font-weight:700;color:#2a2110;font-size:22px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.brand b{font-family:'Playfair Display',serif;font-size:20px;letter-spacing:.3px;display:block;line-height:1}
.brand span{font-size:11px;color:#c9bfa6;letter-spacing:2px;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;color:#d9d0bd;
  text-decoration:none;font-weight:600;font-size:14.5px;cursor:pointer;transition:.15s;border:1px solid transparent}
.nav a .ic{width:20px;text-align:center;opacity:.9}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:linear-gradient(90deg,rgba(216,178,90,.22),rgba(216,178,90,.05));
  color:#fff;border-color:rgba(216,178,90,.35)}
.side .foot{margin-top:auto;font-size:11px;color:#9c947f;padding:10px 8px;line-height:1.6}
/* main */
.main{flex:1;min-width:0;padding:30px 38px 70px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.head h1{font-family:'Playfair Display',serif;font-weight:600;font-size:32px;color:var(--green);letter-spacing:.2px}
.head p{color:var(--ink2);font-size:13.5px;margin-top:3px}
.btn{font-family:inherit;font-weight:700;font-size:13.5px;border:none;cursor:pointer;border-radius:10px;
  padding:10px 16px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn.p{background:var(--green);color:#f3ecdd}.btn.p:hover{background:var(--green2)}
.btn.g{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#2a2110}.btn.g:hover{filter:brightness(1.05)}
.btn.o{background:transparent;border:1.5px solid var(--line);color:var(--ink2)}.btn.o:hover{border-color:var(--gold);color:var(--green)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
/* cards & tables */
.grid{display:grid;gap:18px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(216,178,90,.18),transparent 70%)}
.kpi .lab{font-size:12px;text-transform:uppercase;letter-spacing:1.3px;color:var(--ink2);font-weight:700}
.kpi .val{font-family:'Playfair Display',serif;font-size:30px;font-weight:600;margin-top:8px;color:var(--green)}
.kpi .val.neg{color:var(--bad)}
.kpi .sub{font-size:12px;color:#8a8470;margin-top:3px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:22px}
.panel .ph{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fffdf8,#f7f1e4)}
.panel .ph h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--green);font-weight:600}
.panel .pb{padding:6px 8px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#7c7560;font-weight:700;padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #efe7d4;color:var(--ink)}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#faf6ec}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
.tag.bad{background:var(--badbg);color:var(--bad)}.tag.ok{background:#dcefdf;color:var(--ok)}.tag.warn{background:#f6e7c8;color:#8a5a12}
.muted{color:#9b9580}
.empty{padding:34px;text-align:center;color:#9b9580;font-size:13.5px}
.row-act{display:flex;gap:6px;justify-content:flex-end}
.lnk{background:none;border:none;cursor:pointer;font-weight:700;font-size:12px;color:var(--ink2)}
.lnk:hover{color:var(--gold)}.lnk.del:hover{color:var(--bad)}
/* form */
.formrow{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:14px 14px 16px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;font-weight:700;color:#7c7560;text-transform:uppercase;letter-spacing:.5px}
.f input,.f select{font-family:inherit;font-size:13.5px;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;background:#fffef9;color:var(--ink);min-width:130px}
.f input:focus,.f select:focus{outline:none;border-color:var(--gold)}
.f.sm input{min-width:90px}.f.xs input{min-width:70px}
/* recipe / production cards */
.pcard{border:1px solid var(--line);border-radius:14px;margin:12px 14px;overflow:hidden;background:#fffdf8}
.pcard .pch{background:linear-gradient(90deg,var(--green),#23472f);color:#f3ecdd;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.pcard .pch b{font-family:'Playfair Display',serif;font-size:16px}
.pcard .pcb{padding:6px 4px}
.mini{font-size:12.5px}
.foot-line{display:flex;justify-content:space-between;padding:7px 16px;font-size:13.5px;border-top:1px dashed #e4dcc7}
.foot-line.big{font-weight:800;color:var(--green);background:#f4efe2}
.foot-line .v{font-variant-numeric:tabular-nums;font-weight:700}
.hide{display:none}
@media(max-width:880px){
  .app{flex-direction:column}.side{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center}
  .brand{padding:6px}.nav{display:flex;flex-wrap:wrap;gap:4px}.side .foot{display:none}.main{padding:20px 16px 60px}
  .head h1{font-size:25px}
}
.pbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 14px;margin-bottom:20px;box-shadow:var(--shadow)}
.pbar-l{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#7c7560}
.chip{font-family:inherit;font-size:12.5px;font-weight:700;border:1.5px solid var(--line);background:#fffef9;color:var(--ink2);border-radius:999px;padding:5px 13px;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--gold)}
.chip.on{background:var(--green);color:#f3ecdd;border-color:var(--green)}
.pbar input[type=date]{font-family:inherit;font-size:12.5px;padding:6px 9px;border:1.5px solid var(--line);border-radius:8px;background:#fffef9}
.pbar-cur{margin-left:auto;font-size:12.5px;color:#8a8470;font-weight:600}
.gate{position:fixed;inset:0;z-index:200;background:linear-gradient(180deg,var(--green),#16291d);display:flex;align-items:center;justify-content:center;padding:20px}
.gate.hide{display:none}
.gatebox{background:var(--card);border-radius:18px;padding:34px 30px;width:300px;max-width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.gatebox h2{font-family:'Playfair Display',serif;color:var(--green);font-size:21px;margin-bottom:4px}
.gatebox p{color:var(--ink2);font-size:13px;margin-bottom:16px}
.gatebox input{width:100%;text-align:center;font-size:20px;letter-spacing:6px;padding:12px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:12px;font-family:inherit;background:#fffef9}
.gatebox input:focus{outline:none;border-color:var(--gold)}
.gatebox .btn{width:100%;justify-content:center}
.gateerr{color:var(--bad);font-size:13px;font-weight:700;margin-top:10px;min-height:18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#f3ecdd;
  padding:12px 20px;border-radius:11px;box-shadow:0 8px 28px rgba(0,0,0,.25);font-weight:600;font-size:14px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;bottom:34px}
.toast.bad{background:var(--bad)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body>
<div class="gate" id="gate">
  <div class="gatebox">
    <div class="logo" style="margin:0 auto 14px;width:48px;height:48px;font-size:24px">H</div>
    <h2>HALWAA · Система цеха</h2>
    <p>Введите код доступа</p>
    <input id="gatecode" type="password" inputmode="numeric" placeholder="• • • •" autocomplete="off">
    <button class="btn p" id="gatebtn">Войти</button>

  </div>
</div>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">H</div>
      <div><b>HALWAA</b><span>Цех · ERP</span></div>
    </div>
    <nav class="nav" id="nav">
      <a data-tab="dash" class="active"><span class="ic">◆</span> Сводка</a>
      <a data-tab="tovary"><span class="ic">▣</span> Товары</a>
      <a data-tab="syrye"><span class="ic">⬡</span> Сырьё и приход</a>
      <a data-tab="sup"><span class="ic">☖</span> Поставщики</a>
      <a data-tab="recipes"><span class="ic">❡</span> Рецепты</a>
      <a data-tab="prod"><span class="ic">⚙</span> Производство</a>
      <a data-tab="sklad"><span class="ic">▦</span> Склад</a>
      <a data-tab="ship"><span class="ic">➜</span> Отгрузка</a>
      <a data-tab="cash"><span class="ic">₴</span> Касса</a>
      <a data-tab="report"><span class="ic">▤</span> Отчёт выпуска</a>
      <div style="margin:10px 8px 4px;border-top:1px solid rgba(255,255,255,.12);padding-top:8px;font-size:10px;letter-spacing:2px;color:#9c947f;text-transform:uppercase">Зарплата цеха</div>
      <a data-tab="zp"><span class="ic">₴</span> Зарплата цеха</a>

    </nav>
    <div class="foot">
      <div id="dbstatus">● Локально (браузер)</div>
      <button class="btn o sm" id="syncBtn" style="margin-top:8px;width:100%;color:#d9d0bd;border-color:rgba(255,255,255,.2)">↻ Синхронизировать</button>
      <button class="btn o sm" id="lockBtn" style="margin-top:6px;width:100%;color:#d9d0bd;border-color:rgba(255,255,255,.2)">🔒 Выйти</button>
      <div style="margin-top:10px">HALWAA BARAKA MChJ · удаление по коду</div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ STORE ============ */
const DEL_CODE='2020';
const KEY='halwaa_tseh_v1';
const fresh=()=>({
  products:[], materials:[], suppliers:[{name:'ОптТорг',phone:'',materials:[]}], dealers:['Дилер 1'],
  arrivals:[], recipes:[], productions:[], shipments:[], cash:[]
});
let S=fresh();
/* ===== Supabase (хранение на сервере) ===== */
const SUPA_URL='https://bnpsevarpdrdktxhvijr.supabase.co';
const SUPA_KEY='sb_publishable_s28ajQta7y39yn-Uq34LpA_v9k3qpZw'; /* ← ВСТАВЬ СЮДА anon public ключ: Supabase → Settings → API → Project API keys → anon public */
const ROW='halwaa_tseh';
let db=null, ONLINE=false, saveTimer=null;

function migrate(){ S.suppliers=(S.suppliers||[]).map(x=>typeof x==='string'?{name:x,phone:'',materials:[]}:Object.assign({phone:'',materials:[]},x)); }
function loadLocal(){ try{const r=localStorage.getItem(KEY); if(r)S=Object.assign(fresh(),JSON.parse(r));}catch(e){} }
function saveLocal(){ try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){} }
function load(){ loadLocal(); }
function save(){ _fifo=null; saveLocal(); if(ONLINE&&db){clearTimeout(saveTimer);saveTimer=setTimeout(pushDB,400);} }
async function pushDB(){ try{const{error}=await db.from('app_state').upsert({id:ROW,data:S,updated_at:new Date().toISOString()}); if(error)throw error; setStatus(true);}catch(e){setStatus(false);} }
async function initDB(){
  if(!SUPA_KEY){ setStatus(null); return; }
  if(!window.supabase){ setStatus(false); return; }
  try{
    db=window.supabase.createClient(SUPA_URL,SUPA_KEY);
    const {data,error}=await db.from('app_state').select('data').eq('id',ROW).maybeSingle();
    if(error)throw error;
    if(data&&data.data&&Object.keys(data.data).length){ S=Object.assign(fresh(),data.data); migrate(); }
    else { await pushDB(); }
    ONLINE=true; setStatus(true); render();
  }catch(e){ ONLINE=false; setStatus(false); }
}
async function syncNow(){ if(!db)return toast('Supabase не подключён (нет ключа)',true);
  try{const{data,error}=await db.from('app_state').select('data').eq('id',ROW).maybeSingle(); if(error)throw error;
    if(data&&data.data){S=Object.assign(fresh(),data.data);migrate();render();} setStatus(true);toast('Синхронизировано с сервером');}
  catch(e){setStatus(false);toast('Ошибка связи с сервером',true);} }
function setStatus(s){ const el=document.getElementById('dbstatus'); if(!el)return;
  if(s===null){el.innerHTML='● Локально (браузер)';el.style.color='#c9bfa6';}
  else if(s){el.innerHTML='● Supabase — онлайн';el.style.color='#7ed99a';}
  else{el.innerHTML='● Нет связи (локально)';el.style.color='#e0a86b';} }
function seed(){
  S=fresh();
  S.suppliers=[{name:'ОптТорг',phone:'+998 90 000-00-00',materials:['Мука','Сахар','Маргарин']}];
  S.materials=[{name:'Мука',unit:'кг',supplier:'ОптТорг',min:20},{name:'Сахар',unit:'кг',supplier:'ОптТорг',min:15},{name:'Маргарин',unit:'кг',supplier:'ОптТорг',min:10}];
  S.products=[{name:'Трубочки',unit:'шт',min:50,pay:200},{name:'Пряники',unit:'шт',min:30,pay:150}];
  S.arrivals=[{date:'2026-01-05',supplier:'ОптТорг',material:'Мука',qty:100,price:5000},
    {date:'2026-01-05',supplier:'ОптТорг',material:'Сахар',qty:50,price:9000},
    {date:'2026-01-05',supplier:'ОптТорг',material:'Маргарин',qty:30,price:22000}];
  S.recipes=[{product:'Трубочки',batch:300,items:[{material:'Мука',qty:30},{material:'Сахар',qty:9},{material:'Маргарин',qty:6}]}];
  S.productions=[{date:'2026-01-06',product:'Трубочки',batches:1,mats:[{material:'Мука',qty:28},{material:'Сахар',qty:9},{material:'Маргарин',qty:6}],output:280}];
  S.shipments=[{date:'2026-01-07',dealer:'Дилер 1',product:'Трубочки',qty:120,price:1500,paid:100000}];
  S.cash=[{date:'2026-01-05',type:'Расход',cat:'Оплата поставщику',amount:1190000,note:'мука/сахар/маргарин'},
    {date:'2026-01-07',type:'Приход',cat:'Оплата от дилера',amount:100000,note:''}];
  save(); render();
}
/* ============ HELPERS / COMPUTE ============ */
const sum=(a,f)=>a.reduce((s,x)=>s+(+f(x)||0),0);
const money=n=>{n=Math.round(+n||0);return n.toLocaleString('ru-RU')+' сум';};
const qty=n=>{n=+n||0;return (Math.round(n*1000)/1000).toLocaleString('ru-RU');};
const today=()=>{const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);};
/* ---- период (фильтр по датам, применяется ко всем операциям) ---- */
let PERIOD={from:'',to:''};
function loadPeriod(){try{const r=localStorage.getItem(KEY+'_period');if(r)PERIOD=JSON.parse(r);}catch(e){}}
function savePeriod(){try{localStorage.setItem(KEY+'_period',JSON.stringify(PERIOD));}catch(e){}}
function inP(d){if(!PERIOD.from&&!PERIOD.to)return true;if(!d)return false;if(PERIOD.from&&d<PERIOD.from)return false;if(PERIOD.to&&d>PERIOD.to)return false;return true;}
const qh=t=>{const q=(window._pq||'').trim().toLowerCase();return !q||(''+(t==null?'':t)).toLowerCase().includes(q);};
const RUM=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const monthName=ym=>{const a=(ym||'').split('-');return a.length>1?(RUM[+a[1]-1]||a[1])+' '+a[0]:ym;};
const fAr=()=>S.arrivals.filter(x=>inP(x.date));
const fPr=()=>S.productions.filter(x=>inP(x.date));
const fSh=()=>S.shipments.filter(x=>inP(x.date));
const fCa=()=>S.cash.filter(x=>inP(x.date));
function setPreset(p){const t=new Date();const iso=d=>new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  if(p==='all')PERIOD={from:'',to:''};
  else if(p==='today')PERIOD={from:iso(t),to:iso(t)};
  else if(p==='yest'){const y=new Date(t.getTime()-86400000);PERIOD={from:iso(y),to:iso(y)};}
  else if(p==='month')PERIOD={from:iso(new Date(t.getFullYear(),t.getMonth(),1)),to:iso(t)};
  else if(p==='year')PERIOD={from:iso(new Date(t.getFullYear(),0,1)),to:iso(t)};
  savePeriod();render();}

const byProd=p=>S.recipes.find(r=>r.product===p);
const matArrived=m=>sum(fAr().filter(a=>a.material===m),a=>a.qty);
const matConsumed=m=>sum(fPr(),pr=>sum((pr.mats||[]).filter(x=>x.material===m),x=>x.qty));
const matStock=m=>matArrived(m)-matConsumed(m);
const matAvg=m=>{const a=fAr().filter(x=>x.material===m);const q=sum(a,x=>x.qty);return q?sum(a,x=>x.qty*x.price)/q:0;};
const matUnit=m=>{const x=S.materials.find(t=>t.name===m);return x?x.unit:'';};
function normPerUnit(prod,mat){const r=byProd(prod);if(!r||!r.batch)return 0;const it=(r.items||[]).find(i=>i.material===mat);return it?it.qty/r.batch:0;}
function prodMatCost(prod){const r=byProd(prod);if(!r)return 0;return sum(r.items||[],i=>(i.qty/(r.batch||1))*matAvg(i.material));}
const payOf=p=>{const x=S.products.find(t=>t.name===p);return x?(+x.pay||0):0;};
const prodCost=p=>prodMatCost(p)+payOf(p);
/* ===== FIFO себестоимость сырья ===== */
let _fifo=null;
function computeFIFO(){
  const layers={};
  const arr=S.arrivals.map((a,i)=>({a,i})).sort((x,y)=>(x.a.date||'').localeCompare(y.a.date||'')||x.i-y.i);
  arr.forEach(({a})=>{(layers[a.material]=layers[a.material]||[]).push({rem:+a.qty||0,price:+a.price||0});});
  const prod=S.productions.map((pr,i)=>({pr,i})).sort((x,y)=>(x.pr.date||'').localeCompare(y.pr.date||'')||x.i-y.i);
  const cost=new Map();
  prod.forEach(({pr})=>{let total=0;(pr.mats||[]).forEach(mm=>{let need=+mm.qty||0;if(need<=0)return;const L=layers[mm.material]||[];let c=0;
    while(need>1e-9&&L.length){const ly=L[0];const take=Math.min(need,ly.rem);c+=take*ly.price;ly.rem-=take;need-=take;if(ly.rem<=1e-9)L.shift();}
    if(need>1e-9)c+=need*(matAvg(mm.material)||0);total+=c;});cost.set(pr,total);});
  const now={},remVal={};
  Object.keys(layers).forEach(m=>{const L=layers[m].filter(x=>x.rem>1e-9);now[m]=L.length?L[0].price:0;remVal[m]=sum(L,x=>x.rem*x.price);});
  return {cost,now,remVal};
}
function FIFO(){if(!_fifo)_fifo=computeFIFO();return _fifo;}
function matFifoNow(m){return FIFO().now[m]||0;}
function prodRunMatCost(pr){return FIFO().cost.get(pr)||0;}
function prodRunCost(pr){return prodRunMatCost(pr)+payOf(pr.product)*(+pr.output||0);}
function prodRunUnit(pr){const o=+pr.output||0;return o>0?prodRunCost(pr)/o:0;}
const produced=p=>sum(fPr().filter(x=>x.product===p),x=>x.output);
const shipped=p=>sum(fSh().filter(x=>x.product===p),x=>x.qty);
const prodStock=p=>produced(p)-shipped(p);
const laborOwed=()=>sum(fPr(),x=>payOf(x.product)*(+x.output||0))-sum(fCa().filter(c=>/цех|зарплат/i.test(c.cat)),c=>c.amount);
const CASH_CATS={'Расход':['Зарплата цеху','Оплата поставщику'],'Приход':['Оплата от дилера']};
const supplierDebt=()=>sum(fAr(),a=>a.qty*a.price)-sum(fCa().filter(c=>/поставщик/i.test(c.cat)),c=>c.amount);
const supNames=()=>S.suppliers.map(s=>s.name);
const supMaterials=n=>{const s=S.suppliers.find(x=>x.name===n);return s&&s.materials&&s.materials.length?s.materials:S.materials.map(m=>m.name);};
const supplierDebtOf=n=>sum(fAr().filter(a=>a.supplier===n),a=>a.qty*a.price)-sum(fCa().filter(c=>/поставщик/i.test(c.cat)&&c.supplier===n),c=>c.amount);
const dealerNames=()=>[...new Set([...(S.dealers||[]),...S.shipments.map(s=>s.dealer).filter(Boolean)])];
const dealerDebt=()=>sum(fSh(),s=>s.qty*s.price-(+s.paid||0))-sum(fCa().filter(c=>/дилер/i.test(c.cat)),c=>c.amount);
const dealerDebtOf=n=>sum(fSh().filter(s=>s.dealer===n),s=>s.qty*s.price-(+s.paid||0))-sum(fCa().filter(c=>/дилер/i.test(c.cat)&&c.dealer===n),c=>c.amount);
const cashBal=()=>sum(fCa().filter(c=>c.type==='Приход'),c=>c.amount)-sum(fCa().filter(c=>c.type==='Расход'),c=>c.amount);
const planOutput=pr=>{const r=byProd(pr.product);return r?(r.batch||0)*(+pr.batches||0):0;};

/* ---- Excel-выгрузка (SheetJS) ---- */
function xlsx(filename,sheets){
  if(typeof XLSX==='undefined'){toast('Excel-библиотека не загрузилась — нужен интернет',true);return;}
  const wb=XLSX.utils.book_new();
  sheets.forEach(s=>{const ws=XLSX.utils.json_to_sheet(s.rows.length?s.rows:[{'—':'нет данных за период'}]);XLSX.utils.book_append_sheet(wb,ws,s.name.slice(0,31));});
  XLSX.writeFile(wb,filename);toast('Excel выгружен');
}
const R0=n=>Math.round(+n||0);
const sheetProducts=()=>({name:'Товары',rows:S.products.map(p=>({Товар:p.name,Ед:p.unit,'Зарплата/шт':R0(p.pay),'Себестоимость/ед':R0(prodCost(p.name)),Остаток:prodStock(p.name),Мин:p.min}))});
const sheetMaterials=()=>({name:'Сырьё',rows:S.materials.map(m=>({Материал:m.name,Ед:m.unit,Поставщик:m.supplier||'',Остаток:matStock(m.name),'Ср.цена':R0(matAvg(m.name)),Мин:m.min}))});
const sheetSuppliers=()=>({name:'Поставщики',rows:S.suppliers.map(s=>({Поставщик:s.name,Телефон:s.phone||'',Сырьё:(s.materials||[]).join(', '),Долг:R0(supplierDebtOf(s.name))}))});
const sheetArrivals=()=>({name:'Приход',rows:fAr().map(a=>({Дата:a.date,Поставщик:a.supplier,Материал:a.material,'Кол-во':a.qty,Цена:R0(a.price),Сумма:R0(a.qty*a.price)}))});
const sheetProductions=()=>({name:'Производство',rows:fPr().map(pr=>({Дата:pr.date,Товар:pr.product,Партий:pr.batches,'План выход':planOutput(pr),'Факт выход':(+pr.output||0),Отклонение:planOutput(pr)-(+pr.output||0),'К оплате цеху':R0(payOf(pr.product)*(+pr.output||0))}))});
const sheetSkladT=()=>({name:'Склад товара',rows:S.products.map(p=>({Товар:p.name,Произведено:produced(p.name),Отгружено:shipped(p.name),Остаток:prodStock(p.name)}))});
const sheetSkladS=()=>({name:'Склад сырья',rows:S.materials.map(m=>({Материал:m.name,Приход:matArrived(m.name),'Расход (факт)':matConsumed(m.name),Остаток:matStock(m.name),Сигнал:matStock(m.name)<(+m.min||0)?'мало':'ок'}))});
const sheetShip=()=>({name:'Отгрузка',rows:fSh().map(s=>({Дата:s.date,Дилер:s.dealer,Товар:s.product,'Кол-во':s.qty,Цена:R0(s.price),Сумма:R0(s.qty*s.price),Оплачено:R0(s.paid),Долг:R0(s.qty*s.price-(+s.paid||0)),Контроль:prodStock(s.product)<0?'превышен остаток':'ок'}))});
const sheetCash=()=>({name:'Касса',rows:fCa().map(c=>({Дата:c.date,Тип:c.type,Статья:c.cat,Сумма:R0(c.amount),Комментарий:c.note||''}))});
function sheetRecipes(){const rows=[];S.recipes.forEach(r=>{(r.items||[]).forEach(it=>rows.push({Товар:r.product,'Выход партии':r.batch,Материал:it.material,'Кол-во/партия':it.qty,'Норма/ед':Math.round(it.qty/(r.batch||1)*1000)/1000,'Стоимость/ед':R0((it.qty/(r.batch||1))*matAvg(it.material))}));rows.push({Товар:r.product,Материал:'ИТОГО себестоимость/ед','Стоимость/ед':R0(prodCost(r.product))});});return{name:'Рецепты',rows};}
function doExport(key){
  const per=(PERIOD.from||PERIOD.to)?`_${PERIOD.from||'нач'}_${PERIOD.to||'кон'}`:'';
  const map={
    products:()=>['Товары',[sheetProducts()]],
    materials:()=>['Сырьё',[sheetMaterials()]],
    syrye:()=>['Сырьё',[sheetMaterials(),sheetArrivals()]],
    suppliers:()=>['Поставщики',[sheetSuppliers()]],
    arrivals:()=>['Приход',[sheetArrivals()]],
    recipes:()=>['Рецепты',[sheetRecipes()]],
    productions:()=>['Производство',[sheetProductions()]],
    sklad:()=>['Склад',[sheetSkladT(),sheetSkladS()]],
    ship:()=>['Отгрузка',[sheetShip()]],
    cash:()=>['Касса',[sheetCash()]],
    report:()=>{const prs=fPr();const mA={},pA={};
      prs.forEach(p=>{const k=(p.date||'').slice(0,7)||'—';mA[k]=mA[k]||{plan:0,fact:0,n:0,cost:0};mA[k].plan+=planOutput(p);mA[k].fact+=(+p.output||0);mA[k].cost+=prodRunCost(p);mA[k].n++;});
      prs.forEach(p=>{const k=p.product||'—';pA[k]=pA[k]||{plan:0,fact:0,b:0,n:0,cost:0};pA[k].plan+=planOutput(p);pA[k].fact+=(+p.output||0);pA[k].b+=(+p.batches||0);pA[k].cost+=prodRunCost(p);pA[k].n++;});
      const mRows=Object.keys(mA).sort().reverse().map(k=>({Месяц:monthName(k),Запусков:mA[k].n,План:mA[k].plan,Факт:mA[k].fact,Отклонение:mA[k].plan-mA[k].fact,'% вып':mA[k].plan?Math.round(mA[k].fact/mA[k].plan*100):0,'Себест/ед':R0(mA[k].fact?mA[k].cost/mA[k].fact:0),'Себест всего':R0(mA[k].cost)}));
      const pRows=Object.keys(pA).map(k=>({Товар:k,Запусков:pA[k].n,Партий:pA[k].b,План:pA[k].plan,Факт:pA[k].fact,Отклонение:pA[k].plan-pA[k].fact,'% вып':pA[k].plan?Math.round(pA[k].fact/pA[k].plan*100):0,'Себест/ед':R0(pA[k].fact?pA[k].cost/pA[k].fact:0),'Себест всего':R0(pA[k].cost)}));
      return ['Отчёт_выпуска',[{name:'По месяцам',rows:mRows},{name:'По товарам',rows:pRows}]];},
    all:()=>['HALWAA_цех',[{name:'Сводка',rows:[{Показатель:'Остаток в кассе',Сумма:R0(cashBal())},{Показатель:'Долг поставщикам',Сумма:R0(supplierDebt())},{Показатель:'Долг цеху',Сумма:R0(laborOwed())},{Показатель:'Долг дилера',Сумма:R0(dealerDebt())}]},
      sheetProducts(),sheetMaterials(),sheetSuppliers(),sheetArrivals(),sheetProductions(),sheetSkladT(),sheetSkladS(),sheetShip(),sheetCash()]]
  };
  const [nm,sheets]=map[key]();
  xlsx(`${nm}${per}.xlsx`,sheets);
}

function prodCard(pr,pi){
  const plan=planOutput(pr);
  const dev=plan-(+pr.output||0);
  let status='<span class="tag ok">✓ ОК</span>';
  if(pr.output==null||pr.output==='') status='<span class="tag warn">нет выпуска</span>';
  else if(pr.output<plan) status=`<span class="tag bad">⚠ недовыпуск ${qty(dev)}</span>`;
  else if(pr.output>plan) status=`<span class="tag warn">⚠ перевыпуск ${qty(-dev)}</span>`;
  const pay=payOf(pr.product);
  const inpCss='width:90px;text-align:right;padding:4px 7px;border:1.5px solid var(--line);border-radius:7px;font-family:inherit;color:#0000ff';
  return `<div class="pcard"><div class="pch"><b>${esc(pr.product)}</b>
    <span class="mini">${esc(pr.date||'')} · партий: ${qty(pr.batches)} · план выход: ${qty(plan)} ед. ${pr.done?'· <span style="color:#d8b25a">✓ проведено</span>':''}</span></div>
  <div class="pcb"><table class="mini"><thead><tr><th>Материал (по рецепту)</th><th>Ед.</th><th class="num">Факт</th><th class="num">Норма всего</th><th class="num">Отклонение</th></tr></thead>
  <tbody>${(pr.mats&&pr.mats.length)?(pr.mats).map((mm,mi)=>{const normAll=normPerUnit(pr.product,mm.material)*plan;const d=normAll-(+mm.qty||0);return `<tr>
    <td>${esc(mm.material)}</td><td class="muted">${esc(matUnit(mm.material))}</td>
    <td class="num"><input type="number" value="${mm.qty??''}" data-pmq="${pi}_${mi}" style="${inpCss}"></td>
    <td class="num muted">${qty(normAll)}</td>
    <td class="num">${(mm.qty===''||mm.qty==null)?'':(d<0?`<span class="tag bad">${qty(d)}</span>`:qty(d))}</td></tr>`;}).join('')
    :`<tr><td colspan="5" class="muted" style="padding:12px">Нет рецепта для этого товара — сначала заполните рецепт, затем создайте карточку заново.</td></tr>`}
  </tbody></table>
  <div class="foot-line"><span>Факт выпуск (ед.)</span><span class="v"><input type="number" value="${pr.output??''}" data-out="${pi}" style="width:110px;text-align:right;padding:5px 8px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;color:#0000ff"></span></div>
  <div class="foot-line"><span>План / Отклонение</span><span class="v">${qty(plan)} / ${qty(dev)} &nbsp; ${status}</span></div>
  <div class="foot-line big"><span>К оплате цеху (за выпуск)</span><span class="v">${money(pay*(+pr.output||0))}</span></div>
  ${(()=>{const u=prodRunUnit(pr),norm=prodCost(pr.product),over=norm>0&&u>norm;return `<div class="foot-line"><span>Себестоимость факт / ед.</span><span class="v"><b style="color:${over?'#9c2b2b':'#1f3d2b'}">${u?money(u):'—'}</b> &nbsp;<span class="muted">норма ${money(norm)}</span></span></div>
  <div class="foot-line"><span>Себестоимость партии (факт)</span><span class="v">${money(prodRunCost(pr))}</span></div>`;})()}
  <div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
    <button class="btn ${pr.done?'o':'g'} sm" data-commit="${pi}">${pr.done?'✓ Проведено':'Провести производство'}</button>
    <button class="lnk del" data-del="p" data-i="${pi}">удалить запуск</button></div>
  </div></div>`;
}

/* ============ BIND EVENTS ============ */
function val(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function dval(id){return val(id)||today();}
function num(id){return +val(id)||0;}
function bind(){
  const $=id=>document.getElementById(id);
  if($('zpframe'))$('zpframe').srcdoc=getPayrollHTML();
  if($('pq'))$('pq').oninput=()=>{window._pq=$('pq').value;window._pqf=true;render();};
  if(window._pqf){const q=$('pq');if(q){q.focus();q.setSelectionRange(q.value.length,q.value.length);}window._pqf=false;}
  if($('op_save'))$('op_save').onclick=()=>{const v=(val('op_pin')||'').trim();if(!v)return toast('Введите код',true);if(v===AUTH_CODE)return toast('Код оператора не должен быть 2020',true);S.opPin=v;localStorage.setItem('halwaa_op_pin',v);save();toast('Код оператора сохранён — работает на любом компьютере');render();};
  if($('op_clear'))$('op_clear').onclick=()=>{S.opPin='';localStorage.removeItem('halwaa_op_pin');save();toast('Доступ оператора удалён');render();};
  // период + экспорт
  document.querySelectorAll('[data-prs]').forEach(b=>b.onclick=()=>setPreset(b.dataset.prs));
  if($('papply'))$('papply').onclick=()=>{PERIOD={from:val('pf'),to:val('pt')};savePeriod();render();};
  document.querySelectorAll('[data-export]').forEach(b=>b.onclick=()=>doExport(b.dataset.export));
  if($('seedBtn'))$('seedBtn').onclick=()=>{if(confirm('Загрузить демо-данные? Текущие будут заменены.'))seed();};
  // товары
  if($('t_add'))$('t_add').onclick=()=>{if(!val('t_name'))return toast('Введите название',true);
    S.products.push({name:val('t_name'),unit:val('t_unit')||'шт',min:num('t_min'),pay:num('t_pay')});save();render();toast('Товар добавлен');};
  // материалы
  if($('m_add'))$('m_add').onclick=()=>{if(!val('m_name'))return toast('Введите название',true);
    S.materials.push({name:val('m_name'),unit:val('m_unit')||'кг',supplier:val('m_sup'),min:num('m_min')});save();render();toast('Материал добавлен');};
  // поставщики
  if($('su_add'))$('su_add').onclick=()=>{if(!val('su_name'))return toast('Введите имя',true);
    const mats=[...document.querySelectorAll('.sup_m:checked')].map(c=>c.value);
    S.suppliers.push({name:val('su_name'),phone:val('su_phone'),materials:mats});save();render();toast('Поставщик добавлен');};
  if($('a_sup'))$('a_sup').onchange=()=>{const m=$('a_mat');if(m)m.innerHTML=opt(supMaterials($('a_sup').value));};
  // приход
  if($('a_add'))$('a_add').onclick=()=>{if(!val('a_mat'))return toast('Нет материала',true);
    const pay=num('a_pay'),sup=val('a_sup');
    if(pay>0&&pay>cashBal())return toast(`Нельзя оплатить: в кассе только ${money(cashBal())}`,true);
    S.arrivals.push({date:dval('a_date'),supplier:sup,material:val('a_mat'),qty:num('a_qty'),price:num('a_price')});
    if(pay>0)S.cash.push({date:dval('a_date'),type:'Расход',cat:'Оплата поставщику',supplier:sup,amount:pay,note:'Оплата за приход: '+val('a_mat')});
    save();render();toast(pay>0?`Приход записан, оплачено ${money(pay)}`:'Приход записан');};
  // рецепт открыть
  if($('r_open'))$('r_open').onclick=()=>{const p=val('r_prod');if(!p)return toast('Нет товара',true);
    let r=byProd(p);if(!r){r={product:p,batch:num('r_batch')||1,items:[]};S.recipes.push(r);}else if(num('r_batch'))r.batch=num('r_batch');save();render();};
  document.querySelectorAll('[data-addri]').forEach(b=>b.onclick=()=>{const ri=+b.dataset.addri;const mat=val('ri_mat_'+ri),q=num('ri_qty_'+ri);
    if(!mat||!q)return toast('Материал и кол-во',true);
    if((S.recipes[ri].items||[]).some(it=>it.material===mat))return toast('Этот материал уже есть в рецепте',true);
    S.recipes[ri].items.push({material:mat,qty:q});save();render();});
  // производство открыть — подставляем все материалы из рецепта
  if($('p_open'))$('p_open').onclick=()=>{const p=val('p_prod');if(!p)return toast('Нет товара',true);
    const r=byProd(p);const mats=(r&&r.items?r.items:[]).map(it=>({material:it.material,qty:''}));
    S.productions.push({date:dval('p_date'),product:p,batches:num('p_batches')||1,mats,output:'',done:false});save();render();
    toast(mats.length?`Карточка создана: ${mats.length} видов сырья из рецепта`:'Карточка создана (рецепт пуст)');};
  document.querySelectorAll('[data-pmq]').forEach(inp=>inp.onchange=()=>{const[pi,mi]=inp.dataset.pmq.split('_').map(Number);
    S.productions[pi].mats[mi].qty=inp.value===''?'':(+inp.value||0);save();render();});
  document.querySelectorAll('[data-out]').forEach(inp=>inp.onchange=()=>{const pi=+inp.dataset.out;S.productions[pi].output=inp.value===''?'':(+inp.value||0);save();render();});
  document.querySelectorAll('[data-commit]').forEach(b=>b.onclick=()=>{const pi=+b.dataset.commit;const pr=S.productions[pi];
    if(pr.output===''||pr.output==null)return toast('Сначала впишите факт выпуска',true);
    const noprice=[],nostock=[];
    (pr.mats||[]).forEach(m=>{const q=+m.qty||0;if(q<=0)return;
      if(matAvg(m.material)<=0)noprice.push(m.material);
      else if(matStock(m.material)<0)nostock.push(m.material);});
    if(noprice.length)return toast('Нет цены/прихода: '+[...new Set(noprice)].join(', ')+' — сначала оформите приход сырья',true);
    if(nostock.length)return toast('Не хватает сырья на складе: '+[...new Set(nostock)].join(', '),true);
    if(!confirm(`Провести производство «${pr.product}» — выпуск ${qty(pr.output)} ед.?\nСырьё спишется со склада, начислится оплата цеху.`))return;
    pr.done=true;save();render();toast('Производство проведено');});
  // отгрузка
  if($('s_add'))$('s_add').onclick=()=>{const p=val('s_prod');if(!p)return toast('Нет товара',true);
    const q=num('s_qty');const stock=prodStock(p);
    if(q<=0)return toast('Укажите количество',true);
    if(q>stock)return toast(`Нельзя: на складе только ${qty(stock)} «${p}»`,true);
    S.shipments.push({date:dval('s_date'),dealer:val('s_dealer'),product:p,qty:q,price:num('s_price'),paid:num('s_paid')});save();render();
    toast('Отгрузка записана');};
  // касса
  if($('c_type')){const fc=()=>{$('c_cat').innerHTML=(CASH_CATS[$('c_type').value]||[]).map(o=>`<option>${o}</option>`).join('');tg();};
    const tg=()=>{const cat=$('c_cat').value;const ws=$('c_sup_wrap'),wd=$('c_deal_wrap');if(ws)ws.classList.toggle('hide',!/поставщик/i.test(cat));if(wd)wd.classList.toggle('hide',!/дилер/i.test(cat));};
    $('c_type').onchange=fc;$('c_cat').onchange=tg;fc();}
  if($('c_add'))$('c_add').onclick=()=>{if(!val('c_cat'))return toast('Выберите статью',true);
    const amt=num('c_amount');
    if($('c_type').value==='Расход'&&amt>cashBal())return toast(`Нельзя: в кассе только ${money(cashBal())}`,true);
    const e={date:dval('c_date'),type:val('c_type'),cat:val('c_cat'),amount:amt,note:val('c_note')};
    if(/поставщик/i.test(e.cat))e.supplier=val('c_sup');
    if(/дилер/i.test(e.cat))e.dealer=val('c_deal');
    S.cash.push(e);save();render();toast('Записано');};
  // edit
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editRow(b.dataset.edit,+b.dataset.i));
  // delete (code-guarded)
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const t=b.dataset.del,i=+b.dataset.i;
    delGuard(()=>{
      if(t==='t')S.products.splice(i,1);
      else if(t==='m')S.materials.splice(i,1);
      else if(t==='a')S.arrivals.splice(i,1);
      else if(t==='r')S.recipes.splice(i,1);
      else if(t==='ri')S.recipes[+b.dataset.r].items.splice(i,1);
      else if(t==='p')S.productions.splice(i,1);
      else if(t==='pm')S.productions[+b.dataset.p].mats.splice(i,1);
      else if(t==='s')S.shipments.splice(i,1);
      else if(t==='c')S.cash.splice(i,1);
      else if(t==='su')S.suppliers.splice(i,1);
    });
  });
}
function editRow(t,i){
  if(t==='t'){const p=S.products[i];const name=prompt('Товар:',p.name);if(name===null)return;
    const unit=prompt('Ед.:',p.unit)??p.unit;const min=prompt('Мин. запас:',p.min)??p.min;const pay=prompt('Зарплата за 1 шт (сум):',p.pay)??p.pay;
    Object.assign(p,{name:name.trim()||p.name,unit:unit.trim()||p.unit,min:+min||0,pay:+pay||0});save();render();toast('Изменено');}
  else if(t==='m'){const m=S.materials[i];const name=prompt('Материал:',m.name);if(name===null)return;
    const unit=prompt('Ед.:',m.unit)??m.unit;const sup=prompt('Поставщик:',m.supplier||'')??m.supplier;const min=prompt('Мин. запас:',m.min)??m.min;
    Object.assign(m,{name:name.trim()||m.name,unit:unit.trim()||m.unit,supplier:sup.trim(),min:+min||0});save();render();toast('Изменено');}
  else if(t==='su'){const s=S.suppliers[i];const name=prompt('Поставщик:',s.name);if(name===null)return;
    const phone=prompt('Телефон:',s.phone||'')??s.phone;
    const mats=prompt('Сырьё через запятую:', (s.materials||[]).join(', '));
    Object.assign(s,{name:name.trim()||s.name,phone:phone.trim(),materials:mats===null?s.materials:mats.split(',').map(x=>x.trim()).filter(Boolean)});save();render();toast('Изменено');}
}

function vReport(){
  const prs=fPr();
  const plan=sum(prs,planOutput),fact=sum(prs,p=>+p.output||0),dev=plan-fact;
  const pct=plan?Math.round(fact/plan*100):0;
  const mAgg={};prs.forEach(p=>{const k=(p.date||'').slice(0,7)||'—';mAgg[k]=mAgg[k]||{plan:0,fact:0,n:0,cost:0};mAgg[k].plan+=planOutput(p);mAgg[k].fact+=(+p.output||0);mAgg[k].cost+=prodRunCost(p);mAgg[k].n++;});
  const months=Object.keys(mAgg).sort().reverse();
  const pAgg={};prs.forEach(p=>{const k=p.product||'—';pAgg[k]=pAgg[k]||{plan:0,fact:0,b:0,n:0,cost:0};pAgg[k].plan+=planOutput(p);pAgg[k].fact+=(+p.output||0);pAgg[k].b+=(+p.batches||0);pAgg[k].cost+=prodRunCost(p);pAgg[k].n++;});
  const prods=Object.keys(pAgg).filter(qh);
  const devCell=(pl,fa)=>{const d=pl-fa;if(d>0)return `<span class="tag bad">недовыпуск ${qty(d)}</span>`;if(d<0)return `<span class="tag warn">перевыпуск ${qty(-d)}</span>`;return '<span class="tag ok">в норме</span>';};
  return `<div class="head"><div><h1>Отчёт по выпуску</h1><p>План / факт, недовыпуск и перевыпуск — за период и по месяцам</p></div></div>
   <div class="grid kpis">
     <div class="kpi"><div class="lab">План выпуск</div><div class="val">${qty(plan)}</div></div>
     <div class="kpi"><div class="lab">Факт выпуск</div><div class="val">${qty(fact)}</div></div>
     <div class="kpi"><div class="lab">Отклонение</div><div class="val" style="color:${dev>0?'#9c2b2b':(dev<0?'#b58a2e':'#1f3d2b')}">${qty(dev)}</div></div>
     <div class="kpi"><div class="lab">Среднее выполнение</div><div class="val">${pct}%</div></div>
   </div>
   <div class="panel"><div class="ph"><h3>По месяцам</h3></div><div class="pb">
    <table><thead><tr><th>Месяц</th><th class="num">Запусков</th><th class="num">План</th><th class="num">Факт</th><th>Итог</th><th class="num">% вып.</th><th class="num">Себест./ед</th></tr></thead>
    <tbody>${months.length?months.map(k=>{const a=mAgg[k];const p=a.plan?Math.round(a.fact/a.plan*100):0;const uc=a.fact?a.cost/a.fact:0;return `<tr><td><b>${esc(monthName(k))}</b></td><td class="num">${a.n}</td><td class="num">${qty(a.plan)}</td><td class="num">${qty(a.fact)}</td><td>${devCell(a.plan,a.fact)}</td><td class="num">${p}%</td><td class="num">${money(uc)}</td></tr>`;}).join(''):`<tr><td colspan="7"><div class="empty">Нет данных за период.</div></td></tr>`}</tbody></table>
   </div></div>
   <div class="panel"><div class="ph"><h3>По товарам</h3></div><div class="pb">
    <table><thead><tr><th>Товар</th><th class="num">Запусков</th><th class="num">Партий</th><th class="num">План</th><th class="num">Факт</th><th>Итог</th><th class="num">% вып.</th><th class="num">Себест./ед</th><th class="num">Себест. всего</th></tr></thead>
    <tbody>${prods.length?prods.map(k=>{const a=pAgg[k];const p=a.plan?Math.round(a.fact/a.plan*100):0;const uc=a.fact?a.cost/a.fact:0;return `<tr><td><b>${esc(k)}</b></td><td class="num">${a.n}</td><td class="num">${qty(a.b)}</td><td class="num">${qty(a.plan)}</td><td class="num">${qty(a.fact)}</td><td>${devCell(a.plan,a.fact)}</td><td class="num">${p}%</td><td class="num">${money(uc)}</td><td class="num">${money(a.cost)}</td></tr>`;}).join(''):`<tr><td colspan="9"><div class="empty">${(window._pq||'').trim()?'Не найдено.':'Нет данных за период.'}</div></td></tr>`}</tbody></table>
   </div></div>`;
}

let _zpHtml=null;
function getPayrollHTML(){if(_zpHtml)return _zpHtml;try{_zpHtml=new TextDecoder().decode(Uint8Array.from(atob(PAYROLL_B64),c=>c.charCodeAt(0)));}catch(e){_zpHtml='<h2 style="font-family:sans-serif;padding:30px">Ошибка загрузки модуля</h2>';}return _zpHtml;}
function vZP(){return `<div style="height:calc(100vh - 56px)"><iframe id="zpframe" title="Зарплата цеха" style="width:100%;height:100%;border:none;border-radius:14px;background:#f6f1e7"></iframe></div>`;}
function vSettings(){const op=S.opPin||localStorage.getItem('halwaa_op_pin')||'';
  return `<div class="head"><div><h1>Настройки</h1><p>Доступ оператора к разделу «Зарплата цеха»</p></div></div>
  <div class="panel"><div class="ph"><h3>Оператор</h3></div>
   <div class="formrow">
     <div class="f"><label>Код оператора</label><input id="op_pin" value="${op}" placeholder="напр. 1111"></div>
     <button class="btn p" id="op_save">Сохранить</button>
     ${op?'<button class="btn o" id="op_clear">Удалить доступ</button>':''}
   </div>
   <div style="padding:0 16px 18px;color:var(--ink2);font-size:13.5px;line-height:1.7">
     • Оператор входит своим кодом на любом компьютере и видит <b>только «Зарплата цеха»</b> (Сводка, Товары, Сотрудники, Производство, Выплаты) — может всем управлять.<br>
     • Производство, склад, касса и прочее оператору <b>не видны</b>.<br>
     • Владелец входит кодом <b>2020</b> и видит всё.<br>
     • Данные зарплаты и производства <b>не связаны</b> — две независимые системы.
   </div>
  </div></div>`;}
function applyRole(){const role=sessionStorage.getItem('halwaa_auth');const op=(role==='op');
  document.querySelectorAll('#nav a').forEach(a=>{const t=a.dataset.tab;a.style.display=(op&&t!=='zp')?'none':'';});
  if(op)TAB='zp';
  render();}
/* ============ INIT ============ */
load();
migrate();
loadPeriod();
if(!S.products.length&&!S.materials.length&&!S.arrivals.length){seed();}else{render();}
initDB();
{const sb=document.getElementById('syncBtn');if(sb)sb.onclick=syncNow;}
/* ===== Код доступа 2020 ===== */
const AUTH_CODE='2020';
function showGate(){const g=document.getElementById('gate');if(!g)return;
  const cur=sessionStorage.getItem('halwaa_auth');
  if(cur==='owner'||cur==='op'){g.classList.add('hide');applyRole();return;}
  g.classList.remove('hide');
  const inp=document.getElementById('gatecode'),err=document.getElementById('gateerr');
  const sub=()=>{const c=inp.value.trim();const op=S.opPin||localStorage.getItem('halwaa_op_pin');
    if(c===AUTH_CODE){sessionStorage.setItem('halwaa_auth','owner');g.classList.add('hide');applyRole();}
    else if(op&&c===op){sessionStorage.setItem('halwaa_auth','op');g.classList.add('hide');applyRole();}
    else{err.textContent='Неверный код';inp.value='';inp.focus();}};
  document.getElementById('gatebtn').onclick=sub;
  inp.onkeydown=e=>{if(e.key==='Enter')sub();};
  setTimeout(()=>inp.focus(),100);
}
{const lb=document.getElementById('lockBtn');if(lb)lb.onclick=()=>{sessionStorage.removeItem('halwaa_auth');TAB='dash';showGate();};}
showGate();
</script>
